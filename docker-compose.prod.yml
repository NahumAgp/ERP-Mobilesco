services:
  db:
    image: mysql:8.0
    container_name: mobilesco-db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER:-mobilesco_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mobilescopassword}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mobilesco_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./mobilesco-back
    container_name: mobilesco-backend
    environment:
      SPRING_PROFILE: ${SPRING_PROFILE:-prod}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      DB_USERNAME: ${MYSQL_USER:-mobilesco_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-mobilescopassword}
      JWT_SECRET_BASE64: ${JWT_SECRET_BASE64}
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mobilesco_network
    restart: unless-stopped

  frontend:
    build:
      context: ./mobilesco-front
      args:
        VITE_API_BASE_URL: ""
    container_name: mobilesco-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_CERTS_DIR:-./ssl}:/etc/nginx/ssl:ro
      - ./uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      - backend
    networks:
      - mobilesco_network
    restart: unless-stopped

networks:
  mobilesco_network:
    driver: bridge

volumes:
  mysql_data:
