services:
  db:
    image: mysql:8.0
    container_name: mobilesco-db-dev
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER:-mobilesco_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-mobilescopassword}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
    networks:
      - mobilesco_network_dev
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./mobilesco-back
    container_name: mobilesco-backend-dev
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      DB_USERNAME: ${MYSQL_USER:-mobilesco_user}
      DB_PASSWORD: ${MYSQL_PASSWORD:-mobilescopassword}
      JWT_SECRET_BASE64: ${JWT_SECRET_BASE64:-uJ+Gm85KR5D9TXbzOo85js/uo0/8GK0zvlPNYsdL/gAb5fkch2uQS32R/aoYsTXNOgk/XLoweQGRX07u7yAttA==}
      UPLOAD_DIR: /app/uploads
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mobilesco_network_dev
    restart: unless-stopped

  frontend:
    build:
      context: ./mobilesco-front
      args:
        VITE_API_BASE_URL: ""
    container_name: mobilesco-frontend-dev
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-ssl.conf:/etc/nginx/conf.d/default.conf:ro
      - ${SSL_CERTS_DIR:-./ssl}:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - mobilesco_network_dev
    restart: unless-stopped

networks:
  mobilesco_network_dev:
    driver: bridge

volumes:
  mysql_data_dev:
