services:
  db:
    image: mysql:8.0
    container_name: mobilesco-db-dev
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
    networks:
      - mobilesco_network_dev
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: ./mobilesco-back
    container_name: mobilesco-backend-dev
    ports:
      - "8082:8081"
    env_file:
      - .env.dev
    environment:
      SPRING_PROFILE: ${SPRING_PROFILE:-dev}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - mobilesco_network_dev
    restart: unless-stopped

  frontend:
    build:
      context: ./mobilesco-front
      args:
        VITE_API_BASE_URL: ""
    container_name: mobilesco-frontend-dev
    ports:
      - "80:80"
    volumes:
      - ./uploads:/usr/share/nginx/html/uploads:ro
    depends_on:
      - backend
    networks:
      - mobilesco_network_dev
    restart: unless-stopped

networks:
  mobilesco_network_dev:
    driver: bridge

volumes:
  mysql_data_dev:
